<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Strike - NEXUS GAMES</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#ui { position: fixed; top: 0; left: 0; right: 0; z-index: 10; pointer-events: none; }
#hud { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.7); border-bottom: 1px solid #0ea5e9; }
.hud-item { text-align: center; }
.hud-label { font-size: 10px; color: #0ea5e9; letter-spacing: 2px; text-transform: uppercase; }
.hud-value { font-size: 20px; color: #fff; font-weight: bold; }
#overlay { position: fixed; inset: 0; background: rgba(0,0,10,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
#overlay h1 { font-size: 48px; color: #0ea5e9; text-shadow: 0 0 30px #0ea5e9; margin-bottom: 10px; letter-spacing: 6px; }
#overlay p { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
#startBtn { padding: 14px 48px; background: linear-gradient(135deg,#0ea5e9,#3b82f6); border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
#startBtn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(14,165,233,0.6); }
#controls { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: #475569; font-size: 12px; letter-spacing: 1px; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<div id="ui">
  <div id="hud">
    <div class="hud-item"><div class="hud-label">Score</div><div class="hud-value" id="scoreVal">0</div></div>
    <div class="hud-item"><div class="hud-label">❤️ Health</div><div class="hud-value" id="healthVal">100</div></div>
    <div class="hud-item"><div class="hud-label">Level</div><div class="hud-value" id="levelVal">1</div></div>
    <div class="hud-item"><div class="hud-label">Enemies</div><div class="hud-value" id="enemyVal">0</div></div>
  </div>
</div>
<canvas id="canvas"></canvas>
<div id="overlay">
  <h1>⚡ CYBER STRIKE</h1>
  <p>Top-Down Shooter · Survive the Neon Onslaught</p>
  <button id="startBtn" onclick="startGame()">▶ PLAY NOW</button>
  <p style="margin-top:20px;color:#475569;font-size:12px;">WASD / Arrow Keys to Move · Mouse to Aim & Shoot</p>
</div>
<div id="controls">WASD MOVE · MOUSE AIM & SHOOT</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const state = { running: false, score: 0, health: 100, level: 1, frame: 0 };
const keys = {};
let player, bullets, enemies, particles, powerups, bossActive;

class Player {
  constructor() {
    this.x = canvas.width / 2; this.y = canvas.height / 2;
    this.r = 16; this.speed = 4; this.angle = 0;
    this.shootCooldown = 0; this.invincible = 0;
  }
  update() {
    const spd = this.speed;
    if (keys['w'] || keys['ArrowUp']) this.y -= spd;
    if (keys['s'] || keys['ArrowDown']) this.y += spd;
    if (keys['a'] || keys['ArrowLeft']) this.x -= spd;
    if (keys['d'] || keys['ArrowRight']) this.x += spd;
    this.x = Math.max(this.r, Math.min(canvas.width - this.r, this.x));
    this.y = Math.max(this.r, Math.min(canvas.height - this.r, this.y));
    this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
    if (this.shootCooldown > 0) this.shootCooldown--;
    if (this.invincible > 0) this.invincible--;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    // Glow
    ctx.shadowColor = '#0ea5e9';
    ctx.shadowBlur = 20;
    // Body
    ctx.fillStyle = this.invincible > 0 && this.invincible % 4 < 2 ? 'rgba(255,255,255,0.5)' : '#0ea5e9';
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
    // Cockpit
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(6, 0, 5, 0, Math.PI * 2); ctx.fill();
    // Gun
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(10, -3, 14, 6);
    ctx.restore();
  }
  shoot() {
    if (this.shootCooldown > 0) return;
    this.shootCooldown = 8;
    const speed = 12;
    bullets.push({ x: this.x + Math.cos(this.angle)*24, y: this.y + Math.sin(this.angle)*24, vx: Math.cos(this.angle)*speed, vy: Math.sin(this.angle)*speed, life: 60, r: 5, color: '#0ea5e9', isPlayer: true });
    // Muzzle flash
    for (let i = 0; i < 5; i++) {
      particles.push({ x: this.x + Math.cos(this.angle)*24, y: this.y + Math.sin(this.angle)*24, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 8, r: Math.random()*3+1, color: '#0ea5e9', alpha: 1 });
    }
  }
}

class Enemy {
  constructor(type='basic') {
    this.type = type;
    const side = Math.floor(Math.random() * 4);
    if (side === 0) { this.x = Math.random()*canvas.width; this.y = -30; }
    else if (side === 1) { this.x = canvas.width+30; this.y = Math.random()*canvas.height; }
    else if (side === 2) { this.x = Math.random()*canvas.width; this.y = canvas.height+30; }
    else { this.x = -30; this.y = Math.random()*canvas.height; }
    if (type==='fast') { this.speed=4; this.r=10; this.hp=1; this.color='#f59e0b'; this.score=15; }
    else if (type==='tank') { this.speed=1.2; this.r=24; this.hp=5; this.color='#ef4444'; this.score=50; }
    else if (type==='boss') { this.speed=0.8; this.r=40; this.hp=30; this.color='#8b5cf6'; this.score=200; this.shootTimer=0; }
    else { this.speed=2; this.r=14; this.hp=2; this.color='#f97316'; this.score=10; }
    this.maxHp = this.hp; this.angle = 0; this.pulse = Math.random()*Math.PI*2;
  }
  update() {
    const dx = player.x - this.x, dy = player.y - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    this.angle = Math.atan2(dy, dx);
    this.x += (dx/dist)*this.speed;
    this.y += (dy/dist)*this.speed;
    this.pulse += 0.05;
    if (this.type==='boss') {
      this.shootTimer++;
      if (this.shootTimer % 60 === 0) {
        for (let a = 0; a < 8; a++) {
          const ang = (a/8)*Math.PI*2;
          bullets.push({ x:this.x, y:this.y, vx:Math.cos(ang)*4, vy:Math.sin(ang)*4, life:90, r:7, color:'#8b5cf6', isPlayer:false });
        }
      }
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15 + Math.sin(this.pulse)*5;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(this.r*0.4, 0, this.r*0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(this.r*0.5, 0, this.r*0.15, 0, Math.PI*2); ctx.fill();
    // HP bar
    if (this.hp < this.maxHp) {
      const w = this.r*2; const x = -this.r; const y = -this.r-10;
      ctx.fillStyle = '#333'; ctx.fillRect(x, y, w, 5);
      ctx.fillStyle = this.color; ctx.fillRect(x, y, w*(this.hp/this.maxHp), 5);
    }
    ctx.restore();
  }
}

const mouse = { x: canvas.width/2, y: canvas.height/2, down: false };
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// Background grid
function drawBg() {
  ctx.fillStyle = '#020818';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(14,165,233,0.07)';
  ctx.lineWidth = 1;
  const gridSize = 50;
  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

function spawnEnemy() {
  const r = Math.random();
  let type = 'basic';
  if (r < 0.2) type = 'fast';
  else if (r < 0.3 && state.level >= 2) type = 'tank';
  if (state.score > 500 && !bossActive && !enemies.find(e=>e.type==='boss')) {
    enemies.push(new Enemy('boss'));
    bossActive = true;
    return;
  }
  enemies.push(new Enemy(type));
}

function checkCollisions() {
  // Player bullets vs enemies
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if (!b.isPlayer) continue;
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (Math.sqrt(dx*dx+dy*dy) < b.r + e.r) {
        e.hp--;
        bullets.splice(i, 1);
        spawnHitParticles(b.x, b.y, e.color);
        if (e.hp <= 0) {
          state.score += e.score * state.level;
          if (e.type==='boss') bossActive = false;
          spawnExplosion(e.x, e.y, e.color);
          enemies.splice(j, 1);
        }
        break;
      }
    }
  }
  // Enemy bullets + enemies vs player
  if (player.invincible > 0) return;
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if (b.isPlayer) continue;
    const dx = b.x - player.x, dy = b.y - player.y;
    if (Math.sqrt(dx*dx+dy*dy) < b.r + player.r) {
      bullets.splice(i, 1);
      state.health -= 15;
      player.invincible = 60;
      spawnHitParticles(player.x, player.y, '#fff');
    }
  }
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    const dx = e.x - player.x, dy = e.y - player.y;
    if (Math.sqrt(dx*dx+dy*dy) < e.r + player.r) {
      state.health -= 0.2;
      player.invincible = 20;
    }
  }
}

function spawnHitParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = Math.random()*5+2;
    particles.push({ x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:20+Math.random()*10, r:Math.random()*4+2, color, alpha:1 });
  }
}

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 20; i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = Math.random()*8+2;
    particles.push({ x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:40+Math.random()*20, r:Math.random()*8+3, color, alpha:1 });
  }
}

let spawnTimer = 0;
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  player = new Player();
  bullets = []; enemies = []; particles = []; powerups = [];
  state.running = true; state.score = 0; state.health = 100; state.level = 1; state.frame = 0;
  bossActive = false;
  requestAnimationFrame(loop);
}

function loop() {
  if (!state.running) return;
  state.frame++;
  state.level = Math.floor(state.score / 300) + 1;

  // Spawn
  spawnTimer++;
  const spawnRate = Math.max(40, 100 - state.level * 8);
  if (spawnTimer >= spawnRate) { spawnTimer = 0; spawnEnemy(); }

  drawBg();

  // Update & draw particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95;
    p.life--; p.alpha = p.life / 40;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) { bullets.splice(i,1); continue; }
    ctx.shadowColor = b.color; ctx.shadowBlur = 10;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Enemies
  enemies.forEach(e => { e.update(); e.draw(); });

  // Player
  player.update();
  if (mouse.down) player.shoot();
  player.draw();

  checkCollisions();

  // Health bar
  const hw = 200, hh = 8, hx = canvas.width/2 - hw/2, hy = canvas.height - 30;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(hx-2, hy-2, hw+4, hh+4);
  ctx.fillStyle = `hsl(${state.health*1.2},80%,50%)`;
  ctx.fillRect(hx, hy, hw*(state.health/100), hh);

  // HUD update
  document.getElementById('scoreVal').textContent = state.score;
  document.getElementById('healthVal').textContent = Math.max(0, Math.round(state.health));
  document.getElementById('levelVal').textContent = state.level;
  document.getElementById('enemyVal').textContent = enemies.length;

  if (state.health <= 0) { gameOver(); return; }
  requestAnimationFrame(loop);
}

function gameOver() {
  state.running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1 style="color:#ef4444;text-shadow:0 0 30px #ef4444;">GAME OVER</h1>
    <p style="color:#94a3b8;font-size:20px;margin:10px 0;">Score: <span style="color:#0ea5e9;font-size:28px;font-weight:bold;">${state.score}</span></p>
    <p style="color:#94a3b8;margin-bottom:30px;">Level Reached: ${state.level}</p>
    <button id="startBtn" onclick="startGame()" style="padding:14px 48px;background:linear-gradient(135deg,#0ea5e9,#3b82f6);border:none;border-radius:6px;color:#fff;font-size:16px;font-weight:bold;letter-spacing:3px;cursor:pointer;">🔄 PLAY AGAIN</button>
  `;
  ov.style.display = 'flex';
}

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
