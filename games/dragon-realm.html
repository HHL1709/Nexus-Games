<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Realm RPG - NEXUS GAMES</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#020818; font-family:'Segoe UI',sans-serif; color:#f0f9ff; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
#game { flex:1; display:flex; flex-direction:column; max-width:520px; margin:0 auto; width:100%; padding:12px; }
h2 { font-family:'Courier New',monospace; text-align:center; color:#a78bfa; text-shadow:0 0 20px #a78bfa; letter-spacing:3px; font-size:20px; margin-bottom:8px; }
#battle-scene { background:linear-gradient(180deg,#0a0520 0%,#150a30 60%,#1a0535 100%); border:1px solid #2d1b69; border-radius:12px; padding:16px; flex:1; position:relative; overflow:hidden; }
.battle-bg { position:absolute; inset:0; overflow:hidden; }
.star { position:absolute; background:#fff; border-radius:50%; animation:twinkle linear infinite; }
@keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
.combatant { text-align:center; position:relative; z-index:2; }
.sprite { font-size:72px; line-height:1; margin:8px 0; display:inline-block; filter:drop-shadow(0 0 16px currentColor); }
.sprite.shake { animation:shake 0.3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.sprite.attack { animation:attackAnim 0.4s ease; }
@keyframes attackAnim { 0%{transform:scale(1)} 50%{transform:scale(1.3) translateY(-10px)} 100%{transform:scale(1)} }
.sprite.die { animation:dieAnim 0.8s ease forwards; }
@keyframes dieAnim { to{opacity:0;transform:scale(0.5) translateY(20px)} }
.name { font-family:'Courier New',monospace; font-size:14px; font-weight:bold; letter-spacing:2px; }
.hp-bar-wrap { background:rgba(0,0,0,0.4); border-radius:6px; height:10px; margin:4px 0; overflow:hidden; position:relative; }
.hp-bar { height:100%; border-radius:6px; transition:width 0.5s ease; }
.hp-text { font-size:12px; color:#94a3b8; }
.mp-bar { background:rgba(59,130,246,0.2); border-radius:6px; height:6px; overflow:hidden; margin:2px 0; }
.mp-fill { height:100%; background:linear-gradient(90deg,#3b82f6,#06b6d4); transition:width 0.5s; }
#vs { font-family:'Courier New',monospace; text-align:center; font-size:28px; font-weight:900; color:#f59e0b; text-shadow:0 0 20px #f59e0b; margin:8px 0; z-index:2; position:relative; }
#log { background:rgba(0,0,0,0.5); border:1px solid #1e3a5f; border-radius:8px; padding:10px 12px; margin:8px 0; max-height:80px; overflow-y:auto; font-size:13px; line-height:1.6; }
.log-entry { color:#94a3b8; }
.log-entry.player { color:#0ea5e9; }
.log-entry.enemy { color:#f87171; }
.log-entry.system { color:#f59e0b; font-weight:bold; }
.log-entry.heal { color:#34d399; }
#actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.action-btn { padding:12px; background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.3); border-radius:8px; color:#c4b5fd; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:8px; letter-spacing:0.5px; }
.action-btn:hover { background:rgba(139,92,246,0.3); border-color:#8b5cf6; transform:translateY(-2px); box-shadow:0 4px 15px rgba(139,92,246,0.3); }
.action-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.action-btn .icon { font-size:18px; }
.action-btn .mp-cost { margin-left:auto; font-size:11px; color:#60a5fa; }
#stats-bar { display:flex; justify-content:space-between; background:rgba(0,0,0,0.4); border-radius:8px; padding:8px 12px; margin-bottom:8px; font-size:13px; }
.stat { text-align:center; }
.stat-val { font-family:'Courier New',monospace; font-size:16px; font-weight:bold; color:#a78bfa; }
.stat-lbl { font-size:10px; color:#475569; letter-spacing:1px; }
#overlay { position:fixed; inset:0; background:rgba(2,8,24,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:50; }
#overlay h1 { font-family:'Courier New',monospace; font-size:38px; color:#a78bfa; text-shadow:0 0 40px #a78bfa; letter-spacing:4px; margin-bottom:8px; }
.btn { padding:13px 40px; background:linear-gradient(135deg,#8b5cf6,#6d28d9); border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:bold; letter-spacing:2px; cursor:pointer; margin:6px; transition:0.3s; }
.btn:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(139,92,246,0.6); }
#dmg-float { position:absolute; pointer-events:none; z-index:10; }
.dmg-num { position:absolute; font-family:'Courier New',monospace; font-weight:900; font-size:22px; text-shadow:0 2px 8px rgba(0,0,0,0.8); animation:floatUp 1s ease forwards; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }
</style>
</head>
<body>
<div id="overlay">
  <h1>🐉 DRAGON REALM</h1>
  <p style="color:#94a3b8;margin:8px 0 4px;">Turn-Based RPG · Strategic Combat</p>
  <p style="color:#475569;font-size:13px;margin-bottom:24px;">Defeat 10 monsters to win · Manage your MP wisely</p>
  <button class="btn" onclick="startGame()">⚔️ BEGIN QUEST</button>
</div>

<div id="game">
  <h2>⚔️ DRAGON REALM RPG</h2>
  <div id="stats-bar">
    <div class="stat"><div class="stat-val" id="s-level">1</div><div class="stat-lbl">LEVEL</div></div>
    <div class="stat"><div class="stat-val" id="s-gold">0</div><div class="stat-lbl">GOLD</div></div>
    <div class="stat"><div class="stat-val" id="s-kills">0/10</div><div class="stat-lbl">KILLS</div></div>
    <div class="stat"><div class="stat-val" id="s-atk">12</div><div class="stat-lbl">ATK</div></div>
    <div class="stat"><div class="stat-val" id="s-def">5</div><div class="stat-lbl">DEF</div></div>
  </div>
  <div id="battle-scene">
    <div class="battle-bg" id="battleBg"></div>
    <!-- Enemy -->
    <div class="combatant" style="padding-top:4px;">
      <div class="name" id="e-name">ENEMY</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="e-hp-bar" style="background:linear-gradient(90deg,#ef4444,#f97316);width:100%;"></div></div>
      <div class="hp-text" id="e-hp-text">100/100</div>
      <div class="sprite" id="e-sprite">🐲</div>
    </div>
    <div id="vs">⚔️</div>
    <!-- Player -->
    <div class="combatant">
      <div class="sprite" id="p-sprite">🧙</div>
      <div class="name" id="p-name">HERO</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="p-hp-bar" style="background:linear-gradient(90deg,#10b981,#34d399);width:100%;"></div></div>
      <div class="hp-text" id="p-hp-text">100/100</div>
      <div class="mp-bar"><div class="mp-fill" id="p-mp-bar" style="width:100%;"></div></div>
      <div class="hp-text" id="p-mp-text">MP: 50/50</div>
    </div>
    <div id="dmg-float"></div>
  </div>
  <div id="log"><div class="log-entry system">⚔️ A new battle begins! Choose your action.</div></div>
  <div id="actions">
    <button class="action-btn" id="btn-attack" onclick="doAction('attack')"><span class="icon">⚔️</span>Attack</button>
    <button class="action-btn" id="btn-magic" onclick="doAction('magic')"><span class="icon">✨</span>Magic Blast<span class="mp-cost">15MP</span></button>
    <button class="action-btn" id="btn-heal" onclick="doAction('heal')"><span class="icon">💚</span>Heal<span class="mp-cost">20MP</span></button>
    <button class="action-btn" id="btn-defend" onclick="doAction('defend')"><span class="icon">🛡️</span>Defend</button>
  </div>
</div>

<script>
const MONSTERS = [
  {name:'SLIME',sprite:'🟢',hp:30,atk:6,def:1,gold:10,xp:20,desc:'A wobbly green slime'},
  {name:'GOBLIN',sprite:'👺',hp:45,atk:10,def:2,gold:15,xp:30,desc:'A cunning goblin'},
  {name:'ORC WARRIOR',sprite:'👹',hp:65,atk:14,def:4,gold:20,xp:50,desc:'A powerful orc'},
  {name:'DARK WOLF',sprite:'🐺',hp:55,atk:16,def:3,gold:18,xp:45,desc:'A ferocious wolf'},
  {name:'SKELETON',sprite:'💀',hp:70,atk:18,def:5,gold:25,xp:60,desc:'Undead warrior'},
  {name:'TROLL',sprite:'👾',hp:90,atk:20,def:6,gold:30,xp:80,desc:'A massive troll'},
  {name:'DARK ELF',sprite:'🧝',hp:80,atk:22,def:7,gold:35,xp:90,desc:'Elven dark mage'},
  {name:'PHOENIX',sprite:'🔥',hp:100,atk:25,def:5,gold:40,xp:110,desc:'Fire phoenix'},
  {name:'DEMON LORD',sprite:'😈',hp:120,atk:28,def:8,gold:50,xp:140,desc:'Demon overlord'},
  {name:'ELDER DRAGON',sprite:'🐉',hp:150,atk:35,def:10,gold:100,xp:200,desc:'The final boss!'},
];

const SPELLS = ['🌊 Aqua Blast','⚡ Thunder Strike','❄️ Ice Shard','🌟 Star Burst','💥 Mega Blast'];

let hero, enemy, monsterIdx, defending, gameActive, animating;

function startGame() {
  document.getElementById('overlay').style.display='none';
  hero = { name:'HERO', hp:100, maxHp:100, mp:50, maxMp:50, atk:12, def:5, level:1, xp:0, xpNext:100, gold:0, kills:0 };
  monsterIdx = 0; defending = false; gameActive = true; animating = false;
  // Stars BG
  const bg = document.getElementById('battleBg');
  bg.innerHTML = '';
  for(let i=0;i<30;i++) {
    const s=document.createElement('div'); s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
    bg.appendChild(s);
  }
  spawnEnemy();
  updateUI();
}

function spawnEnemy() {
  const m = MONSTERS[monsterIdx];
  enemy = { ...m, maxHp:m.hp };
  addLog(`A wild ${m.name} appeared! ${m.sprite} - ${m.desc}`, 'system');
  document.getElementById('e-sprite').textContent = m.sprite;
  document.getElementById('e-name').textContent = m.name;
  updateUI();
}

function updateUI() {
  // Player bars
  const pPct = Math.max(0,(hero.hp/hero.maxHp)*100);
  const mpPct = (hero.mp/hero.maxMp)*100;
  document.getElementById('p-hp-bar').style.width=pPct+'%';
  document.getElementById('p-hp-bar').style.background=pPct>50?'linear-gradient(90deg,#10b981,#34d399)':pPct>25?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#ef4444,#f87171)';
  document.getElementById('p-hp-text').textContent=`HP: ${Math.max(0,hero.hp)}/${hero.maxHp}`;
  document.getElementById('p-mp-bar').style.width=mpPct+'%';
  document.getElementById('p-mp-text').textContent=`MP: ${hero.mp}/${hero.maxMp}`;
  // Enemy bars
  const ePct=Math.max(0,(enemy.hp/enemy.maxHp)*100);
  document.getElementById('e-hp-bar').style.width=ePct+'%';
  document.getElementById('e-hp-text').textContent=`HP: ${Math.max(0,enemy.hp)}/${enemy.maxHp}`;
  // Stats
  document.getElementById('s-level').textContent=hero.level;
  document.getElementById('s-gold').textContent=hero.gold;
  document.getElementById('s-kills').textContent=`${hero.kills}/10`;
  document.getElementById('s-atk').textContent=hero.atk;
  document.getElementById('s-def').textContent=hero.def;
  // Buttons
  document.getElementById('btn-magic').disabled=hero.mp<15;
  document.getElementById('btn-heal').disabled=hero.mp<20;
}

function addLog(text, type='') {
  const log=document.getElementById('log');
  const div=document.createElement('div'); div.className='log-entry '+type; div.textContent=text;
  log.appendChild(div); log.scrollTop=log.scrollHeight;
}

function showDmg(text, color, side='enemy') {
  const container=document.getElementById('dmg-float');
  const el=document.createElement('div'); el.className='dmg-num';
  el.style.color=color;
  el.style.left=(side==='enemy'?'55%':'20%');
  el.style.top='30%';
  el.textContent=text;
  container.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

function setActionsDisabled(v) {
  ['btn-attack','btn-magic','btn-heal','btn-defend'].forEach(id=>document.getElementById(id).disabled=v);
}

async function doAction(action) {
  if(animating) return;
  animating=true; setActionsDisabled(true);
  defending=false;
  let playerDmg=0, logTxt='', logType='player';
  const sprite=document.getElementById('p-sprite');
  const eSprite=document.getElementById('e-sprite');

  if(action==='attack') {
    playerDmg=Math.max(1,hero.atk+Math.floor(Math.random()*8)-Math.floor(enemy.def*0.5));
    sprite.classList.add('attack'); setTimeout(()=>sprite.classList.remove('attack'),400);
    eSprite.classList.add('shake'); setTimeout(()=>eSprite.classList.remove('shake'),300);
    showDmg('-'+playerDmg,'#f87171','enemy');
    logTxt=`⚔️ You attack for ${playerDmg} damage!`;
  } else if(action==='magic') {
    const spell=SPELLS[Math.floor(Math.random()*SPELLS.length)];
    playerDmg=Math.max(1,hero.atk*1.8+Math.floor(Math.random()*12)-Math.floor(enemy.def*0.3));
    playerDmg=Math.round(playerDmg);
    hero.mp-=15;
    sprite.classList.add('attack'); setTimeout(()=>sprite.classList.remove('attack'),400);
    eSprite.classList.add('shake'); setTimeout(()=>eSprite.classList.remove('shake'),300);
    showDmg('-'+playerDmg,'#c084fc','enemy');
    logTxt=`✨ ${spell} hits ${enemy.name} for ${playerDmg} damage! (MAGIC)`;
  } else if(action==='heal') {
    const healed=Math.floor(20+Math.random()*15);
    hero.hp=Math.min(hero.maxHp,hero.hp+healed);
    hero.mp-=20;
    showDmg('+'+healed,'#34d399','player');
    logTxt=`💚 You heal yourself for ${healed} HP!`;
    logType='heal';
    addLog(logTxt,logType);
    await delay(700);
  } else if(action==='defend') {
    defending=true;
    logTxt='🛡️ You take a defensive stance! (50% damage reduction)';
  }

  if(action!=='heal') { enemy.hp-=playerDmg; addLog(logTxt,logType); }
  updateUI();
  await delay(600);

  // Check enemy death
  if(enemy.hp<=0) {
    eSprite.classList.add('die');
    await delay(900);
    hero.gold+=enemy.gold; hero.kills++;
    hero.xp+=enemy.xp;
    addLog(`🏆 ${enemy.name} defeated! +${enemy.gold}G +${enemy.xp}XP`, 'system');
    // Level up
    if(hero.xp>=hero.xpNext) {
      hero.level++; hero.xp-=hero.xpNext; hero.xpNext=Math.round(hero.xpNext*1.5);
      hero.maxHp+=15; hero.hp=hero.maxHp; hero.maxMp+=8; hero.mp=hero.maxMp;
      hero.atk+=3; hero.def+=1;
      addLog(`✨ LEVEL UP! Now Level ${hero.level}! Stats increased!`, 'system');
    }
    monsterIdx++;
    if(monsterIdx>=MONSTERS.length) { winGame(); return; }
    eSprite.classList.remove('die');
    spawnEnemy();
    animating=false; setActionsDisabled(false); updateUI(); return;
  }

  // Enemy turn
  await delay(400);
  let enemyDmg=Math.max(1,enemy.atk+Math.floor(Math.random()*6)-hero.def);
  if(defending) enemyDmg=Math.ceil(enemyDmg*0.5);
  hero.hp-=enemyDmg;
  eSprite.classList.add('attack'); setTimeout(()=>eSprite.classList.remove('attack'),400);
  sprite.classList.add('shake'); setTimeout(()=>sprite.classList.remove('shake'),300);
  showDmg('-'+enemyDmg,'#f87171','player');
  addLog(`${enemy.sprite} ${enemy.name} attacks for ${enemyDmg} damage!${defending?' (Blocked!)':''}`, 'enemy');
  // MP regen
  hero.mp=Math.min(hero.maxMp,hero.mp+5);
  updateUI();
  await delay(600);

  if(hero.hp<=0) { gameOver(); return; }
  animating=false; setActionsDisabled(false);
}

function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

async function winGame() {
  await delay(400);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:#f59e0b;text-shadow:0 0 40px #f59e0b;">🏆 VICTORY!</h1>
    <p style="color:#94a3b8;font-size:18px;margin:10px 0;">All enemies defeated!</p>
    <p style="color:#a78bfa;font-size:16px;margin-bottom:8px;">Level ${hero.level} · Gold: ${hero.gold}</p>
    <p style="color:#94a3b8;margin-bottom:24px;">You are the Dragon Realm champion!</p>
    <button class="btn" onclick="startGame()">🔄 PLAY AGAIN</button>
  `;
  ov.style.display='flex';
}

function gameOver() {
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:#ef4444;text-shadow:0 0 40px #ef4444;">💀 DEFEATED</h1>
    <p style="color:#94a3b8;font-size:18px;margin:10px 0;">You were slain by ${enemy.name}</p>
    <p style="color:#a78bfa;margin-bottom:8px;">Level ${hero.level} · Gold: ${hero.gold} · Kills: ${hero.kills}</p>
    <button class="btn" onclick="startGame()">🔄 TRY AGAIN</button>
  `;
  ov.style.display='flex';
}
</script>
</body>
</html>
