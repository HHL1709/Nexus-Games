<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem Crush - NEXUS GAMES</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#020818; font-family:'Segoe UI',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
h1 { font-family:'Courier New',monospace; color:#8b5cf6; text-shadow:0 0 20px #8b5cf6; font-size:24px; letter-spacing:3px; margin-bottom:10px; }
#info { display:flex; gap:28px; margin-bottom:12px; font-size:14px; letter-spacing:1px; }
.info-val { font-family:'Courier New',monospace; font-size:18px; font-weight:bold; color:#a78bfa; }
#board-wrap { position:relative; }
canvas { border:2px solid #3730a3; border-radius:12px; box-shadow:0 0 40px rgba(139,92,246,0.4); cursor:pointer; }
#overlay { position:fixed; inset:0; background:rgba(2,8,24,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:50; }
#overlay h1 { font-size:36px; margin-bottom:8px; }
.btn { padding:13px 40px; background:linear-gradient(135deg,#8b5cf6,#6d28d9); border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:bold; letter-spacing:2px; cursor:pointer; margin:6px; transition:0.3s; }
.btn:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(139,92,246,0.6); }
#hint { color:#475569; font-size:12px; margin-top:10px; letter-spacing:1px; }
</style>
</head>
<body>
<h1>💎 GEM CRUSH</h1>
<div id="info">
  <div>Score <span class="info-val" id="scoreDisp">0</span></div>
  <div>Level <span class="info-val" id="levelDisp">1</span></div>
  <div>Target <span class="info-val" id="targetDisp">500</span></div>
  <div>Moves <span class="info-val" id="movesDisp">20</span></div>
</div>
<div id="board-wrap">
  <canvas id="c"></canvas>
</div>
<div id="hint">Click a gem, then click adjacent gem to swap</div>
<div id="overlay">
  <h1>💎 GEM CRUSH</h1>
  <p style="color:#94a3b8;margin:8px 0 20px;">Match 3 or more gems to score · Reach the target!</p>
  <button class="btn" onclick="startGame()">▶ PLAY</button>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const COLS = 8, ROWS = 8, CELL = 58;
c.width = COLS * CELL + 2;
c.height = ROWS * CELL + 2;

const GEMS = [
  { color:'#ef4444', glow:'#fca5a5', symbol:'♦', name:'ruby' },
  { color:'#3b82f6', glow:'#93c5fd', symbol:'●', name:'sapphire' },
  { color:'#10b981', glow:'#6ee7b7', symbol:'★', name:'emerald' },
  { color:'#f59e0b', glow:'#fcd34d', symbol:'▲', name:'topaz' },
  { color:'#8b5cf6', glow:'#c4b5fd', symbol:'■', name:'amethyst' },
  { color:'#ec4899', glow:'#f9a8d4', symbol:'♥', name:'ruby2' }
];

let board, selected, score, level, moves, target, animating, particles, falling, comboMulti;

function randGem() { return Math.floor(Math.random()*GEMS.length); }

function createBoard() {
  const b = Array.from({length:ROWS},()=>Array(COLS).fill(0).map(()=>randGem()));
  // Remove initial matches
  for(let r=0;r<ROWS;r++) for(let c2=0;c2<COLS;c2++) {
    while(getMatches(b).length>0) b[r][c2]=randGem();
  }
  return b;
}

function startGame() {
  document.getElementById('overlay').style.display='none';
  board=createBoard();
  selected=null; score=0; level=1; moves=20; target=500; animating=false; particles=[]; falling=false; comboMulti=1;
  updateInfo();
  render();
}

function updateInfo() {
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('levelDisp').textContent=level;
  document.getElementById('targetDisp').textContent=target;
  document.getElementById('movesDisp').textContent=moves;
}

function getMatches(b) {
  const matches=new Set();
  // Horizontal
  for(let r=0;r<ROWS;r++) for(let c2=0;c2<COLS-2;c2++) {
    if(b[r][c2]===b[r][c2+1]&&b[r][c2]===b[r][c2+2]) {
      let end=c2+2;
      while(end+1<COLS&&b[r][end+1]===b[r][c2]) end++;
      for(let k=c2;k<=end;k++) matches.add(`${r},${k}`);
    }
  }
  // Vertical
  for(let r=0;r<ROWS-2;r++) for(let c2=0;c2<COLS;c2++) {
    if(b[r][c2]===b[r+1][c2]&&b[r][c2]===b[r+2][c2]) {
      let end=r+2;
      while(end+1<ROWS&&b[end+1][c2]===b[r][c2]) end++;
      for(let k=r;k<=end;k++) matches.add(`${k},${c2}`);
    }
  }
  return [...matches].map(s=>{const[r,c2]=s.split(',');return{r:+r,c:+c2};});
}

function render() {
  ctx.fillStyle='#05001a'; ctx.fillRect(0,0,c.width,c.height);
  // Grid
  for(let r=0;r<ROWS;r++) for(let c2=0;c2<COLS;c2++) {
    const x=c2*CELL+1, y=r*CELL+1, g=board[r][c2];
    if(g===null) continue;
    const gem=GEMS[g];
    const isSel=selected&&selected.r===r&&selected.c===c2;
    const cx2=x+CELL/2, cy2=y+CELL/2;
    // Cell bg
    ctx.fillStyle=isSel?'rgba(139,92,246,0.2)':'rgba(255,255,255,0.02)';
    ctx.fillRect(x,y,CELL-2,CELL-2);
    // Gem shadow
    ctx.shadowColor=gem.glow; ctx.shadowBlur=isSel?28:14;
    // Gem body
    const R=CELL*0.36;
    const grad=ctx.createRadialGradient(cx2-R*0.3,cy2-R*0.3,R*0.1,cx2,cy2,R);
    grad.addColorStop(0,gem.glow); grad.addColorStop(0.4,gem.color); grad.addColorStop(1,gem.color+'88');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(cx2,cy2,R*(isSel?1.15:1),0,Math.PI*2); ctx.fill();
    // Symbol
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font=`bold ${CELL*0.32}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(gem.symbol,cx2,cy2);
    // Selection ring
    if(isSel) {
      ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(cx2,cy2,R*1.2,0,Math.PI*2); ctx.stroke();
    }
  }
  ctx.shadowBlur=0; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  // Particles
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life--; p.alpha=p.life/30;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.alpha); ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

async function trySwap(r1,c1,r2,c2) {
  if(animating) return;
  // Check adjacent
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return;
  animating=true;
  // Swap
  [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
  render(); await delay(150);
  const matches=getMatches(board);
  if(!matches.length) {
    // Swap back
    [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];
    render(); animating=false; return;
  }
  moves--;
  await processMatches();
  animating=false;
  updateInfo();
  if(score>=target) { nextLevel(); return; }
  if(moves<=0) { gameOver(); return; }
}

async function processMatches() {
  let combo=0;
  while(true) {
    const matches=getMatches(board);
    if(!matches.length) break;
    combo++;
    const pts=matches.length*10*combo;
    score+=pts;
    // Explosion particles
    matches.forEach(({r,c2:cc})=>{
      const gem=GEMS[board[r][cc]];
      for(let k=0;k<8;k++){const a=Math.random()*Math.PI*2,s=Math.random()*5+2;particles.push({x:cc*CELL+CELL/2,y:r*CELL+CELL/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*5+2,life:30,color:gem.color,alpha:1});}
      board[r][cc]=null;
    });
    render(); await delay(250);
    // Fall
    for(let cc=0;cc<COLS;cc++) {
      let empty=ROWS-1;
      for(let r=ROWS-1;r>=0;r--) {
        if(board[r][cc]!==null){board[empty][cc]=board[r][cc];if(empty!==r)board[r][cc]=null;empty--;}
      }
      for(let r=empty;r>=0;r--) board[r][cc]=randGem();
    }
    render(); await delay(200);
    updateInfo();
  }
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

c.addEventListener('click', e => {
  if(animating) return;
  const rect=c.getBoundingClientRect();
  const scale=c.width/rect.width;
  const mx=(e.clientX-rect.left)*scale, my=(e.clientY-rect.top)*scale;
  const cc=Math.floor(mx/CELL), r=Math.floor(my/CELL);
  if(cc<0||cc>=COLS||r<0||r>=ROWS) return;
  if(!selected) { selected={r,c:cc}; render(); }
  else {
    const prev=selected; selected=null;
    if(prev.r===r&&prev.c===cc) { render(); return; }
    trySwap(prev.r,prev.c,r,cc);
  }
});

function nextLevel() {
  level++; target=Math.round(target*1.6); moves=20+level*2;
  board=createBoard(); selected=null;
  updateInfo(); render();
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1>✨ LEVEL ${level-1} CLEAR!</h1><p style="color:#94a3b8;margin:10px 0 20px;">Score: ${score} · Bonus Moves!</p><button class="btn" onclick="document.getElementById('overlay').style.display='none'">NEXT LEVEL →</button>`;
  ov.style.display='flex';
}

function gameOver() {
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 style="color:#ef4444;text-shadow:0 0 30px #ef4444;">OUT OF MOVES!</h1>
    <p style="color:#94a3b8;font-size:18px;margin:10px 0;">Score: <span style="color:#a78bfa;font-size:26px;">${score}</span></p>
    <p style="color:#94a3b8;margin-bottom:20px;">Level ${level} · Target was ${target}</p>
    <button class="btn" onclick="startGame()">🔄 PLAY AGAIN</button>`;
  ov.style.display='flex';
}
</script>
</body>
</html>
