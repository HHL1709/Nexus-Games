<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyper Dash - NEXUS GAMES</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Courier New',monospace; }
canvas { display:block; }
#overlay { position:fixed; inset:0; background:rgba(0,0,10,0.93); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
#overlay h1 { font-size:50px; color:#06b6d4; text-shadow:0 0 40px #06b6d4,0 0 80px #06b6d4; letter-spacing:4px; margin-bottom:6px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{text-shadow:0 0 40px #06b6d4} 50%{text-shadow:0 0 80px #06b6d4,0 0 120px #06b6d4} }
.btn { padding:14px 52px; background:linear-gradient(135deg,#06b6d4,#0ea5e9); border:none; border-radius:6px; color:#fff; font-size:17px; font-weight:900; letter-spacing:3px; cursor:pointer; margin:8px; transition:0.3s; }
.btn:hover { transform:scale(1.06); box-shadow:0 0 40px rgba(6,182,212,0.7); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>⚡ HYPER DASH</h1>
  <p style="color:#94a3b8;margin:6px 0 6px;">Dash through neon at extreme speeds</p>
  <p id="bestScore" style="color:#f59e0b;margin-bottom:22px;">Best: 0</p>
  <button class="btn" onclick="startGame()">▶ DASH</button>
  <p style="color:#475569;font-size:12px;margin-top:16px;">SPACE / ↑ / CLICK to Jump · Double Jump Available</p>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = window.innerWidth, H = window.innerHeight;
c.width = W; c.height = H;

const FLOOR = H * 0.75;
const keys = {};
window.addEventListener('keydown', e => { if(!keys[e.key]) onJump(); keys[e.key]=true; });
window.addEventListener('keyup', e => keys[e.key]=false);
c.addEventListener('click', onJump);

let gameState, player, obstacles, particles, bgLayers, score, speed, bestScore=0, frame=0, gameRunning=false, scoreTimer=0;

function onJump() {
  if(!gameRunning) return;
  if(player.jumps > 0) {
    player.vy = -16;
    player.jumps--;
    spawnJumpParticles();
  }
}

function spawnJumpParticles() {
  for(let i=0;i<12;i++) {
    particles.push({ x:player.x, y:player.y+player.h, vx:(Math.random()-0.5)*6, vy:Math.random()*4+1, r:Math.random()*4+2, life:20, color:'#06b6d4', alpha:1 });
  }
}

// BG parallax layers
function createBgLayers() {
  return [
    // Far buildings
    { speed:0.3, objects: Array.from({length:12},(_,i)=>({x:i*(W/5),w:40+Math.random()*80,h:80+Math.random()*200,color:`rgba(14,165,233,${0.05+Math.random()*0.1})`})) },
    // Mid buildings
    { speed:0.6, objects: Array.from({length:8},(_,i)=>({x:i*(W/3),w:60+Math.random()*100,h:120+Math.random()*150,color:`rgba(139,92,246,${0.07+Math.random()*0.1})`})) },
    // Near buildings
    { speed:1.2, objects: Array.from({length:6},(_,i)=>({x:i*(W/2.5),w:80+Math.random()*120,h:60+Math.random()*100,color:`rgba(6,182,212,${0.04+Math.random()*0.06})`})) }
  ];
}

function startGame() {
  document.getElementById('overlay').style.display='none';
  player = { x:W*0.18, y:FLOOR-48, w:32, h:48, vy:0, jumps:2, trail:[] };
  obstacles = []; particles = []; score = 0; speed = 6; frame = 0; gameRunning = true;
  bgLayers = createBgLayers();
  requestAnimationFrame(loop);
}

function spawnObstacle() {
  const types = ['low','high','double','gap'];
  const type = types[Math.floor(Math.random()*types.length)];
  if(type==='low') {
    obstacles.push({ x:W+60, y:FLOOR-55, w:28, h:55, color:'#ef4444', type:'low' });
  } else if(type==='high') {
    obstacles.push({ x:W+60, y:FLOOR-140, w:24, h:80, color:'#f59e0b', type:'high' });
  } else if(type==='double') {
    obstacles.push({ x:W+60, y:FLOOR-55, w:24, h:55, color:'#ef4444', type:'low' });
    obstacles.push({ x:W+120, y:FLOOR-55, w:24, h:55, color:'#ef4444', type:'low' });
  } else {
    // Gap in floor - visual only (floor gap)
    obstacles.push({ x:W+60, y:FLOOR, w:80, h:20, color:'transparent', type:'gap', isGap:true });
  }
}

let spawnDist = 0;
function loop() {
  if(!gameRunning) return;
  frame++;

  // Increase speed
  speed = 6 + Math.floor(score/200)*0.5;
  speed = Math.min(speed, 18);

  // BG
  ctx.fillStyle='#000010'; ctx.fillRect(0,0,W,H);
  // Gradient sky
  const grad = ctx.createLinearGradient(0,0,0,FLOOR);
  grad.addColorStop(0,'#000820');
  grad.addColorStop(1,'#000');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,FLOOR);

  // BG layers
  bgLayers.forEach(layer => {
    layer.objects.forEach(obj => {
      obj.x -= layer.speed * (speed/6);
      if(obj.x + obj.w < 0) obj.x = W + obj.w;
      ctx.fillStyle = obj.color;
      ctx.fillRect(obj.x, FLOOR - obj.h, obj.w, obj.h);
      // Window lights
      for(let wy=FLOOR-obj.h+10;wy<FLOOR-10;wy+=18) {
        for(let wx=obj.x+6;wx<obj.x+obj.w-6;wx+=14) {
          if(Math.random()>0.97) { // occasional flicker
            ctx.fillStyle='rgba(255,255,150,0.8)';
            ctx.fillRect(wx,wy,5,7);
          } else {
            ctx.fillStyle='rgba(14,165,233,0.2)';
            ctx.fillRect(wx,wy,5,7);
          }
        }
      }
    });
  });

  // Grid lines on floor
  ctx.strokeStyle='rgba(6,182,212,0.15)'; ctx.lineWidth=1;
  // Perspective grid
  for(let i=0;i<12;i++) {
    const x = (frame*speed*0.4 + i*(W/6)) % W;
    ctx.beginPath(); ctx.moveTo(x,FLOOR); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let i=0;i<5;i++) {
    const y = FLOOR + i*(H-FLOOR)/4;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Floor glow
  ctx.fillStyle='rgba(6,182,212,0.1)';
  ctx.fillRect(0,FLOOR,W,4);
  ctx.fillStyle='rgba(6,182,212,0.05)';
  ctx.fillRect(0,FLOOR+4,W,H-FLOOR);

  // Spawn obstacles
  spawnDist += speed;
  const minDist = Math.max(350, 600 - speed*15);
  if(spawnDist > minDist) { spawnDist=0; spawnObstacle(); }

  // Particles
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; p.alpha=p.life/20;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Obstacles
  for(let i=obstacles.length-1;i>=0;i--) {
    const o=obstacles[i];
    o.x -= speed;
    if(o.x+o.w<0){obstacles.splice(i,1);continue;}
    if(o.isGap) continue;
    ctx.shadowColor=o.color; ctx.shadowBlur=12;
    ctx.fillStyle=o.color;
    ctx.beginPath(); ctx.roundRect(o.x,o.y,o.w,o.h,4); ctx.fill();
    // Glow top
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillRect(o.x+2,o.y,o.w-4,3);
    ctx.shadowBlur=0;
    // Collision
    const px=player.x, py=player.y, pw=player.w, ph=player.h;
    if(px+pw-4>o.x && px+4<o.x+o.w && py+ph-4>o.y && py+4<o.y+o.h) {
      endGame(); return;
    }
  }

  // Player trail
  player.trail.push({x:player.x+player.w/2, y:player.y+player.h/2, a:0.6});
  if(player.trail.length>15) player.trail.shift();
  player.trail.forEach((t,i)=>{
    ctx.globalAlpha=t.a*(i/15);
    ctx.fillStyle='#06b6d4'; ctx.shadowColor='#06b6d4'; ctx.shadowBlur=10;
    const r=player.w/2*(i/15)*0.7;
    ctx.beginPath(); ctx.arc(t.x,t.y,r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Player physics
  player.vy += 0.8; // gravity
  player.y += player.vy;
  if(player.y+player.h >= FLOOR) {
    player.y = FLOOR-player.h;
    player.vy = 0;
    player.jumps = 2;
  }

  // Draw player
  ctx.save();
  ctx.translate(player.x + player.w/2, player.y + player.h/2);
  // Tilt based on velocity
  ctx.rotate(Math.min(0.3, Math.max(-0.3, player.vy*0.02)));
  ctx.shadowColor='#06b6d4'; ctx.shadowBlur=24;
  // Body
  ctx.fillStyle='#06b6d4';
  ctx.beginPath(); ctx.roundRect(-player.w/2,-player.h/2,player.w,player.h,6); ctx.fill();
  // Visor
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.roundRect(-player.w/2+4,-player.h/2+6,player.w-8,player.h*0.35,4); ctx.fill();
  // Chest light
  ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(0,4,5,0,Math.PI*2); ctx.fill();
  // Legs
  ctx.fillStyle='#0369a1'; ctx.shadowBlur=0;
  ctx.fillRect(-player.w/2+2,player.h/2-10,10,10);
  ctx.fillRect(player.w/2-12,player.h/2-10,10,10);
  ctx.restore();

  // Score
  scoreTimer++;
  if(scoreTimer>2) { score++; scoreTimer=0; }

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,36);
  ctx.shadowColor='#06b6d4'; ctx.shadowBlur=10;
  ctx.fillStyle='#06b6d4'; ctx.font='bold 14px Courier New'; ctx.textAlign='left';
  ctx.fillText(`SCORE: ${score}`,12,22);
  ctx.textAlign='center';
  ctx.fillStyle='#f59e0b'; ctx.fillText(`BEST: ${Math.max(bestScore,score)}`,W/2,22);
  ctx.textAlign='right';
  ctx.fillStyle='#94a3b8'; ctx.fillText(`SPEED: ${speed.toFixed(1)}x`,W-12,22);
  ctx.textAlign='left'; ctx.shadowBlur=0;

  // Jump indicator
  for(let j=0;j<2;j++) {
    ctx.fillStyle=j<player.jumps?'#06b6d4':'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(player.x+8+j*18, FLOOR+14, 5, 0, Math.PI*2); ctx.fill();
  }

  requestAnimationFrame(loop);
}

function endGame() {
  gameRunning=false;
  if(score>bestScore) bestScore=score;
  document.getElementById('bestScore').textContent='Best: '+bestScore;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:#ef4444;text-shadow:0 0 40px #ef4444;">💥 CRASHED!</h1>
    <p style="color:#94a3b8;font-size:20px;margin:10px 0;">Score: <span style="color:#06b6d4;font-size:30px;font-weight:bold;">${score}</span></p>
    <p style="color:#f59e0b;margin-bottom:24px;">Best: ${bestScore}</p>
    <button class="btn" onclick="startGame()">🔄 DASH AGAIN</button>
    <p style="color:#475569;font-size:12px;margin-top:16px;">SPACE / ↑ / CLICK to Jump · Double Jump Available</p>
  `;
  ov.style.display='flex';
}
</script>
</body>
</html>
