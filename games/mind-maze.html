<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Maze Pro - NEXUS GAMES</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#020818; font-family:'Segoe UI',sans-serif; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
h1 { font-family:'Courier New',monospace; font-size:28px; color:#8b5cf6; text-shadow:0 0 20px #8b5cf6; letter-spacing:3px; margin-bottom:8px; }
#info { display:flex; gap:32px; margin-bottom:16px; font-size:14px; color:#94a3b8; letter-spacing:1px; }
.info-val { color:#8b5cf6; font-weight:bold; font-size:18px; }
#maze-wrap { position:relative; }
canvas { border:2px solid #8b5cf6; border-radius:8px; box-shadow:0 0 40px rgba(139,92,246,0.3); }
#msg { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(2,8,24,0.9); border-radius:8px; }
#msg h2 { font-size:32px; color:#10b981; text-shadow:0 0 20px #10b981; margin-bottom:12px; }
#msg p { color:#94a3b8; margin-bottom:20px; }
.btn { padding:12px 36px; background:linear-gradient(135deg,#8b5cf6,#3b82f6); border:none; border-radius:6px; color:#fff; font-size:15px; font-weight:bold; letter-spacing:2px; cursor:pointer; transition:0.3s; }
.btn:hover { transform:scale(1.05); }
</style>
</head>
<body>
<h1>🧩 MIND MAZE PRO</h1>
<div id="info">
  <div>Level <span class="info-val" id="lvlDisp">1</span></div>
  <div>Moves <span class="info-val" id="movesDisp">0</span></div>
  <div>Best <span class="info-val" id="bestDisp">--</span></div>
  <div>Time <span class="info-val" id="timeDisp">0:00</span></div>
</div>
<div id="maze-wrap">
  <canvas id="c"></canvas>
  <div id="msg">
    <h2>🧩 MIND MAZE</h2>
    <p>Navigate from 🔵 to 🟢 in minimum moves</p>
    <button class="btn" onclick="initGame()">START</button>
  </div>
</div>
<p style="color:#475569;font-size:12px;margin-top:12px;letter-spacing:1px;">WASD / Arrow Keys to Move</p>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const CELL = 36;
let level = 1, moves = 0, best = {}, timer = 0, timerInterval, won = false;
let maze, player, goal, mazeW, mazeH;

function genMaze(w, h) {
  const grid = Array.from({length:h}, () => Array(w).fill({ walls: [true,true,true,true] }));
  // Deep copy
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) grid[y][x] = { walls:[true,true,true,true], visited:false };
  const stack = [];
  const start = {x:0,y:0};
  grid[0][0].visited = true;
  stack.push(start);
  const dirs = [{dx:0,dy:-1,w:0,ow:2},{dx:1,dy:0,w:1,ow:3},{dx:0,dy:1,w:2,ow:0},{dx:-1,dy:0,w:3,ow:1}];
  while (stack.length) {
    const curr = stack[stack.length-1];
    const neighbors = dirs.map(d => ({x:curr.x+d.dx,y:curr.y+d.dy,w:d.w,ow:d.ow}))
      .filter(n=>n.x>=0&&n.x<w&&n.y>=0&&n.y<h&&!grid[n.y][n.x].visited);
    if (!neighbors.length) { stack.pop(); continue; }
    const next = neighbors[Math.floor(Math.random()*neighbors.length)];
    grid[curr.y][curr.x].walls[next.w] = false;
    grid[next.y][next.x].walls[next.ow] = false;
    grid[next.y][next.x].visited = true;
    stack.push({x:next.x,y:next.y});
  }
  return grid;
}

function initGame() {
  document.getElementById('msg').style.display = 'none';
  won = false;
  moves = 0;
  timer = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timer++;
    const m = Math.floor(timer/60), s = timer%60;
    document.getElementById('timeDisp').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }, 1000);

  mazeW = Math.min(5 + level * 2, 21);
  mazeH = Math.min(5 + level, 15);
  c.width = mazeW * CELL + 2;
  c.height = mazeH * CELL + 2;
  maze = genMaze(mazeW, mazeH);
  player = {x:0,y:0};
  goal = {x:mazeW-1,y:mazeH-1};
  document.getElementById('lvlDisp').textContent = level;
  document.getElementById('movesDisp').textContent = 0;
  draw();
}

function draw() {
  ctx.fillStyle = '#020818';
  ctx.fillRect(0,0,c.width,c.height);
  // Draw maze
  for (let y=0;y<mazeH;y++) {
    for (let x=0;x<mazeW;x++) {
      const cell = maze[y][x];
      const px = x*CELL+1, py = y*CELL+1;
      // Cell background
      ctx.fillStyle = 'rgba(139,92,246,0.03)';
      ctx.fillRect(px,py,CELL,CELL);
      // Walls
      ctx.strokeStyle = '#4c1d95';
      ctx.lineWidth = 2;
      ctx.lineCap = 'square';
      if (cell.walls[0]) { ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+CELL,py); ctx.stroke(); }
      if (cell.walls[1]) { ctx.beginPath(); ctx.moveTo(px+CELL,py); ctx.lineTo(px+CELL,py+CELL); ctx.stroke(); }
      if (cell.walls[2]) { ctx.beginPath(); ctx.moveTo(px+CELL,py+CELL); ctx.lineTo(px,py+CELL); ctx.stroke(); }
      if (cell.walls[3]) { ctx.beginPath(); ctx.moveTo(px,py+CELL); ctx.lineTo(px,py); ctx.stroke(); }
    }
  }
  // Goal
  const gx = goal.x*CELL+1+CELL/2, gy = goal.y*CELL+1+CELL/2;
  ctx.shadowColor='#10b981'; ctx.shadowBlur=20;
  ctx.fillStyle='#10b981';
  ctx.beginPath(); ctx.arc(gx,gy,CELL/2-6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏁',gx,gy);
  // Player
  const px2 = player.x*CELL+1+CELL/2, py2 = player.y*CELL+1+CELL/2;
  ctx.shadowColor='#8b5cf6'; ctx.shadowBlur=20;
  ctx.fillStyle='#8b5cf6';
  ctx.beginPath(); ctx.arc(px2,py2,CELL/2-4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.fillText('●',px2,py2);
  ctx.shadowBlur=0; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function move(dx, dy) {
  if (won) return;
  const nx = player.x+dx, ny = player.y+dy;
  if (nx<0||nx>=mazeW||ny<0||ny>=mazeH) return;
  const cell = maze[player.y][player.x];
  // Check wall: 0=up,1=right,2=down,3=left
  const wallIdx = dy===-1?0:dx===1?1:dy===1?2:3;
  if (cell.walls[wallIdx]) return;
  player.x=nx; player.y=ny;
  moves++;
  document.getElementById('movesDisp').textContent = moves;
  draw();
  if (player.x===goal.x && player.y===goal.y) winLevel();
}

function winLevel() {
  won = true;
  clearInterval(timerInterval);
  if (!best[level] || moves < best[level]) best[level] = moves;
  document.getElementById('bestDisp').textContent = best[level];
  const msg = document.getElementById('msg');
  msg.innerHTML = `
    <h2>✅ LEVEL ${level} CLEAR!</h2>
    <p>Solved in <strong style="color:#8b5cf6">${moves} moves</strong> · ${Math.floor(timer/60)}:${String(timer%60).padStart(2,'0')}</p>
    <button class="btn" onclick="level++;initGame()">NEXT LEVEL →</button>
  `;
  msg.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp'||e.key==='w') { move(0,-1); e.preventDefault(); }
  if (e.key==='ArrowDown'||e.key==='s') { move(0,1); e.preventDefault(); }
  if (e.key==='ArrowLeft'||e.key==='a') { move(-1,0); e.preventDefault(); }
  if (e.key==='ArrowRight'||e.key==='d') { move(1,0); e.preventDefault(); }
});
</script>
</body>
</html>
