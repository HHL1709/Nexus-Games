<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Arcade Blast - NEXUS GAMES</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Courier New',monospace; }
canvas { display:block; border:2px solid #fb923c; box-shadow:0 0 40px rgba(251,146,60,0.4); }
#overlay { position:fixed; inset:0; background:rgba(0,0,10,0.93); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
#overlay h1 { font-size:46px; color:#fb923c; text-shadow:0 0 40px #fb923c; letter-spacing:4px; margin-bottom:8px; }
.btn { padding:14px 48px; background:linear-gradient(135deg,#fb923c,#f97316); border:none; border-radius:6px; color:#fff; font-size:16px; font-weight:bold; letter-spacing:3px; cursor:pointer; margin:8px; transition:0.3s; }
.btn:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(251,146,60,0.6); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🕹️ NEON BLAST</h1>
  <p style="color:#94a3b8;margin:8px 0 24px;">Break all bricks · Collect power-ups · Beat the score</p>
  <button class="btn" onclick="startGame()">▶ PLAY NOW</button>
  <p style="color:#475569;font-size:12px;margin-top:16px;">← → Arrow Keys / Mouse to Move Paddle</p>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 480, H = 680;
c.width = W; c.height = H;
c.style.maxHeight = '95vh';
c.style.maxWidth = '95vw';

const keys = {};
window.addEventListener('keydown', e => { keys[e.key]=true; });
window.addEventListener('keyup', e => keys[e.key]=false);
c.addEventListener('mousemove', e => {
  const rect = c.getBoundingClientRect();
  const scale = W / rect.width;
  mouse.x = (e.clientX - rect.left) * scale;
});
const mouse = { x: W/2 };

// Colors
const COLORS = ['#ef4444','#f59e0b','#10b981','#0ea5e9','#8b5cf6','#fb923c','#ec4899'];

let paddle, balls, bricks, particles, powerups, state;

class Paddle {
  constructor() { this.w=90; this.h=12; this.x=W/2-45; this.y=H-40; this.speed=7; }
  update() {
    if (keys['ArrowLeft']||keys['a']) this.x -= this.speed;
    if (keys['ArrowRight']||keys['d']) this.x += this.speed;
    this.x = 0.8*this.x + 0.2*(mouse.x - this.w/2); // smooth follow mouse
    this.x = Math.max(0, Math.min(W-this.w, this.x));
  }
  draw() {
    ctx.save();
    ctx.shadowColor='#fb923c'; ctx.shadowBlur=20;
    const grad = ctx.createLinearGradient(this.x,0,this.x+this.w,0);
    grad.addColorStop(0,'#f97316'); grad.addColorStop(0.5,'#fb923c'); grad.addColorStop(1,'#f97316');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(this.x,this.y,this.w,this.h,6); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillRect(this.x+6,this.y+3,this.w-12,3);
    ctx.restore();
  }
}

class Ball {
  constructor(x,y,vx,vy) {
    this.x=x||W/2; this.y=y||(H-60); this.r=8;
    this.vx=vx||(Math.random()<0.5?4:-4); this.vy=vy||(-6);
    this.trail=[];
    this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
    this.active=true;
  }
  update() {
    this.trail.push({x:this.x,y:this.y,a:1});
    if(this.trail.length>12) this.trail.shift();
    this.trail.forEach(t=>t.a-=0.08);
    this.x+=this.vx; this.y+=this.vy;
    if(this.x-this.r<0){this.x=this.r;this.vx*=-1;}
    if(this.x+this.r>W){this.x=W-this.r;this.vx*=-1;}
    if(this.y-this.r<0){this.y=this.r;this.vy*=-1;}
    if(this.y>H+20){this.active=false;return;}
    // Paddle collision
    if(this.vy>0&&this.x>paddle.x&&this.x<paddle.x+paddle.w&&this.y+this.r>paddle.y&&this.y-this.r<paddle.y+paddle.h) {
      this.vy=-Math.abs(this.vy);
      const hit=(this.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      this.vx=hit*7;
      this.vx=Math.max(-8,Math.min(8,this.vx));
      spawnParticles(this.x,paddle.y,'#fb923c',6);
    }
  }
  draw() {
    this.trail.forEach((t,i)=>{
      ctx.globalAlpha=Math.max(0,t.a*0.4);
      ctx.fillStyle=this.color;
      ctx.beginPath(); ctx.arc(t.x,t.y,this.r*(i/12),0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.shadowColor=this.color; ctx.shadowBlur=18;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(this.x-2,this.y-2,this.r*0.35,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

class Brick {
  constructor(x,y,color,type,hp) {
    this.x=x; this.y=y; this.w=42; this.h=18;
    this.color=color; this.type=type||'normal'; this.hp=hp||1; this.maxHp=this.hp;
    this.alive=true; this.shake=0; this.shakeX=0; this.shakeY=0;
  }
  draw() {
    if(!this.alive) return;
    ctx.save();
    ctx.translate(this.x+this.shakeX*Math.sin(this.shake*0.5), this.y+this.shakeY*Math.sin(this.shake*0.5));
    if(this.shake>0){this.shake--;this.shakeX=(Math.random()-0.5)*3;this.shakeY=(Math.random()-0.5)*3;}
    ctx.shadowColor=this.color; ctx.shadowBlur=8;
    const alpha = this.hp/this.maxHp;
    ctx.fillStyle=this.color;
    ctx.globalAlpha=0.4+alpha*0.6;
    ctx.beginPath(); ctx.roundRect(1,1,this.w-2,this.h-2,4); ctx.fill();
    ctx.globalAlpha=1;
    // Border
    ctx.strokeStyle=this.color; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(1,1,this.w-2,this.h-2,4); ctx.stroke();
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(4,3,this.w-8,3);
    // HP pips
    if(this.maxHp>1) {
      for(let i=0;i<this.maxHp;i++) {
        ctx.fillStyle = i<this.hp?'#fff':'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.arc(this.w/2-(this.maxHp-1)*4+i*8,this.h/2,2,0,Math.PI*2); ctx.fill();
      }
    }
    // Special type
    if(this.type==='bomb') { ctx.fillStyle='#fff'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText('💣',this.w/2,this.h/2+4); }
    if(this.type==='multi') { ctx.fillStyle='#fff'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText('✦',this.w/2,this.h/2+4); }
    ctx.restore();
  }
}

function spawnParticles(x,y,color,n=8) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*5+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*4+1,life:25+Math.random()*15,color,alpha:1});
  }
}

function buildLevel(lvl) {
  bricks=[];
  const rows=Math.min(4+Math.floor(lvl/2),10);
  const cols=9;
  const offX=(W-(cols*46))/2;
  const offY=60;
  for(let r=0;r<rows;r++) {
    for(let col=0;col<cols;col++) {
      if(Math.random()<0.1) continue;
      const color=COLORS[(r+lvl)%COLORS.length];
      const rnd=Math.random();
      const type=rnd<0.05?'bomb':rnd<0.1?'multi':'normal';
      const hp=Math.random()<0.15?2:Math.random()<0.05?3:1;
      bricks.push(new Brick(offX+col*46, offY+r*24, color, type, hp));
    }
  }
}

function startGame() {
  document.getElementById('overlay').style.display='none';
  paddle=new Paddle();
  balls=[new Ball()];
  particles=[]; powerups=[];
  state={score:0,level:1,lives:3,running:true};
  buildLevel(1);
  requestAnimationFrame(loop);
}

function loop() {
  if(!state.running) return;
  // BG
  ctx.fillStyle='#050005'; ctx.fillRect(0,0,W,H);
  // Scanlines
  for(let y=0;y<H;y+=4){ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,y,W,2);}
  // Grid
  ctx.strokeStyle='rgba(251,146,60,0.03)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;p.alpha=p.life/35;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Bricks
  bricks.forEach(b=>b.draw());

  // Ball-brick collision
  balls.forEach(ball=>{
    bricks.forEach(b=>{
      if(!b.alive||!ball.active) return;
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h) {
        b.hp--; b.shake=8;
        spawnParticles(ball.x,ball.y,b.color,10);
        if(b.hp<=0){
          b.alive=false;
          state.score+=10*(1+(b.maxHp-1)*0.5);
          spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color,16);
          // Bomb: destroy neighbors
          if(b.type==='bomb'){
            bricks.forEach(nb=>{if(nb!==b&&Math.abs(nb.x-b.x)<50&&Math.abs(nb.y-b.y)<30){nb.alive=false;spawnParticles(nb.x+nb.w/2,nb.y+nb.h/2,nb.color,8);}});
          }
          // Multi: spawn extra ball
          if(b.type==='multi') balls.push(new Ball(ball.x,ball.y,-ball.vx,ball.vy));
          // Power-up drop
          if(Math.random()<0.15) powerups.push({x:b.x+b.w/2,y:b.y,vy:2,type:['wide','slow','multi'][Math.floor(Math.random()*3)]});
        }
        // Bounce
        const fromTop=ball.y-ball.r<b.y+b.h&&ball.y-ball.r>b.y-4;
        const fromBottom=ball.y+ball.r>b.y&&ball.y+ball.r<b.y+4;
        if(fromTop||fromBottom) ball.vy*=-1; else ball.vx*=-1;
      }
    });
  });

  // Power-ups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i]; p.y+=p.vy;
    if(p.y>H){powerups.splice(i,1);continue;}
    // Draw
    ctx.shadowColor='#10b981';ctx.shadowBlur=12;ctx.fillStyle='#10b981';
    ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.type==='wide'?'W':p.type==='slow'?'S':'M',p.x,p.y);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.shadowBlur=0;
    // Collect
    if(p.x>paddle.x&&p.x<paddle.x+paddle.w&&p.y>paddle.y&&p.y<paddle.y+paddle.h){
      powerups.splice(i,1);
      if(p.type==='wide') paddle.w=Math.min(130,paddle.w+20);
      if(p.type==='slow') balls.forEach(b=>{b.vx*=0.7;b.vy*=0.7;});
      if(p.type==='multi') balls.push(new Ball(paddle.x+paddle.w/2,paddle.y-10));
    }
  }

  // Balls
  for(let i=balls.length-1;i>=0;i--){
    balls[i].update();
    if(!balls[i].active){balls.splice(i,1);continue;}
    balls[i].draw();
  }

  paddle.update(); paddle.draw();

  // Check no balls
  if(balls.length===0){
    state.lives--;
    if(state.lives<=0){gameOver();return;}
    balls=[new Ball()];
  }

  // Check all bricks gone
  if(!bricks.some(b=>b.alive)){
    state.level++;
    buildLevel(state.level);
    balls=[new Ball()];
    spawnParticles(W/2,H/2,'#10b981',30);
  }

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,32);
  ctx.fillStyle='#fb923c';ctx.font='bold 13px Courier New';ctx.textAlign='left';
  ctx.fillText(`SCORE: ${Math.round(state.score)}`,8,20);
  ctx.textAlign='center';ctx.fillText(`LEVEL ${state.level}`,W/2,20);
  ctx.textAlign='right';ctx.fillText('❤️'.repeat(state.lives),W-8,20);
  ctx.textAlign='left';

  requestAnimationFrame(loop);
}

function gameOver(){
  state.running=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:#ef4444;text-shadow:0 0 30px #ef4444;">GAME OVER</h1>
    <p style="color:#94a3b8;font-size:20px;margin:10px 0;">Score: <span style="color:#fb923c;font-size:28px;font-weight:bold;">${Math.round(state.score)}</span></p>
    <p style="color:#94a3b8;margin-bottom:24px;">Level ${state.level} Reached</p>
    <button class="btn" onclick="startGame()">🔄 PLAY AGAIN</button>
  `;
  ov.style.display='flex';
}
</script>
</body>
</html>
