<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Retro Run - NEXUS GAMES</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Courier New',monospace; }
canvas { display:block; image-rendering:pixelated; border:2px solid #0ea5e9; box-shadow:0 0 30px rgba(14,165,233,0.3); }
#overlay { position:fixed; inset:0; background:rgba(0,0,20,0.93); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
#overlay h1 { font-size:44px; color:#0ea5e9; text-shadow:0 0 40px #0ea5e9; letter-spacing:3px; margin-bottom:6px; }
.btn { padding:14px 48px; background:linear-gradient(135deg,#0ea5e9,#3b82f6); border:none; border-radius:6px; color:#fff; font-size:16px; font-weight:bold; letter-spacing:3px; cursor:pointer; margin:8px; transition:0.3s; }
.btn:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(14,165,233,0.6); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🎮 SUPER RETRO RUN</h1>
  <p style="color:#94a3b8;margin:6px 0 4px;">Collect coins · Avoid obstacles · Break records</p>
  <p id="hiBest" style="color:#f59e0b;margin-bottom:20px;">Best: 0</p>
  <button class="btn" onclick="startGame()">▶ PLAY NOW</button>
  <p style="color:#475569;font-size:12px;margin-top:12px;">SPACE / ↑ / W / CLICK to Jump · Double Jump!</p>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W=600,H=400;
c.width=W; c.height=H;
c.style.maxWidth='95vw'; c.style.maxHeight='95vh';

const keys={};
window.addEventListener('keydown',e=>{if(!keys[e.key])onJump();keys[e.key]=true;});
window.addEventListener('keyup',e=>keys[e.key]=false);
c.addEventListener('click',onJump);

const GROUND=H-70;
let player,obstacles,coins,particles,clouds,score,speed,frame,gameRunning,best=0,spawnTimer=0,coinTimer=0,cloudTimer=0,scoreTimer=0;

function onJump(){
  if(!gameRunning)return;
  if(player.jumps>0){player.vy=-13;player.jumps--;spawnJumpFx();}
}

function spawnJumpFx(){
  for(let i=0;i<8;i++){const a=Math.PI/2+(-0.5+Math.random())*1.5,s=Math.random()*4+2;particles.push({x:player.x+player.w/2,y:player.y+player.h,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3,life:15,color:'#0ea5e9',alpha:1});}
}

// Pixel drawing helpers
function pxRect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(Math.round(x),Math.round(y),w,h);}

function drawPlayer(){
  const px=player.x,py=player.y;
  const run=Math.floor(frame/6)%4;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(px+player.w/2,GROUND+6,player.w/2,4,0,0,Math.PI*2);ctx.fill();
  // Body - pixel art style
  pxRect(px+4,py,8,4,'#fbbf24'); // hair
  pxRect(px+2,py+4,12,10,'#fcd34d'); // head
  pxRect(px+4,py+6,4,4,'#fde68a'); // face
  pxRect(px+5,py+7,2,2,'#1e3a5f'); // eyes
  pxRect(px+9,py+7,2,2,'#1e3a5f');
  pxRect(px+2,py+14,12,10,'#3b82f6'); // body
  pxRect(px,py+14,2,8,'#3b82f6'); // left arm
  pxRect(px+14,py+14,2,8,'#3b82f6'); // right arm
  // Legs animation
  if(player.jumps<2){
    pxRect(px+3,py+24,5,8,'#1e40af');
    pxRect(px+8,py+24,5,8,'#1e40af');
  } else {
    const legOff=Math.sin(run*Math.PI/2)*4;
    pxRect(px+3,py+24+legOff,5,8,'#1e40af');
    pxRect(px+8,py+24-legOff,5,8,'#1e40af');
  }
  // Feet
  pxRect(px+2,py+32,6,4,'#92400e');
  pxRect(px+8,py+32,6,4,'#92400e');
  // Jump flash
  if(player.jumps===0){ctx.strokeStyle='rgba(14,165,233,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(px+player.w/2,py+player.h/2,player.w*0.8,0,Math.PI*2);ctx.stroke();}
}

function drawCloud(cl){
  ctx.fillStyle=`rgba(200,220,255,${cl.a})`;
  ctx.beginPath();ctx.ellipse(cl.x,cl.y,cl.w,cl.h,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cl.x-cl.w*0.4,cl.y+2,cl.w*0.6,cl.h*0.8,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cl.x+cl.w*0.4,cl.y+2,cl.w*0.6,cl.h*0.8,0,0,Math.PI*2);ctx.fill();
}

function drawObstacle(o){
  if(o.type==='cactus'){
    pxRect(o.x+8,o.y,8,o.h,'#15803d');
    pxRect(o.x,o.y+8,8,12,'#15803d');
    pxRect(o.x+16,o.y+12,8,10,'#15803d');
    pxRect(o.x+4,o.y+4,4,4,'#16a34a');
    pxRect(o.x+16,o.y+8,4,4,'#16a34a');
  } else if(o.type==='rock'){
    ctx.fillStyle='#6b7280';
    ctx.beginPath();ctx.moveTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w,o.y+o.h);ctx.lineTo(o.x,o.y+o.h);ctx.closePath();ctx.fill();
    ctx.fillStyle='#9ca3af';
    ctx.beginPath();ctx.moveTo(o.x+o.w/2-2,o.y+2);ctx.lineTo(o.x+o.w/2+8,o.y+o.h*0.5);ctx.lineTo(o.x+o.w/2-4,o.y+o.h*0.5);ctx.closePath();ctx.fill();
  } else if(o.type==='bird'){
    pxRect(o.x,o.y+4,24,8,'#7c3aed');
    pxRect(o.x+4,o.y,8,8,'#7c3aed');
    const wingFlap=Math.floor(frame/8)%2;
    pxRect(o.x+6,o.y-8+wingFlap*4,12,8,'#8b5cf6');
    pxRect(o.x+20,o.y+4,6,4,'#fbbf24');
    pxRect(o.x,o.y+4,6,4,'#1e3a5f');
  }
}

function drawCoin(co){
  const pulse=Math.sin(frame*0.1+co.phase)*2;
  ctx.shadowColor='#f59e0b';ctx.shadowBlur=10;
  ctx.fillStyle='#f59e0b';
  ctx.beginPath();ctx.arc(co.x,co.y,8+pulse*0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fcd34d';
  ctx.beginPath();ctx.arc(co.x-2,co.y-2,4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  player={x:60,y:GROUND-36,w:16,h:36,vy:0,jumps:2};
  obstacles=[];coins=[];particles=[];
  clouds=[
    {x:100,y:50,w:60,h:20,speed:0.5,a:0.15},
    {x:350,y:30,w:80,h:25,speed:0.3,a:0.1},
    {x:520,y:70,w:50,h:18,speed:0.7,a:0.12}
  ];
  score=0;speed=4.5;frame=0;gameRunning=true;spawnTimer=0;coinTimer=0;cloudTimer=0;scoreTimer=0;
  requestAnimationFrame(loop);
}

function spawnObstacle(){
  const r=Math.random();
  if(r<0.4) obstacles.push({x:W+40,y:GROUND-44,w:24,h:44,type:'cactus'});
  else if(r<0.7) obstacles.push({x:W+40,y:GROUND-32,w:32,h:32,type:'rock'});
  else obstacles.push({x:W+40,y:GROUND-80,w:24,h:20,type:'bird'});
}

function loop(){
  if(!gameRunning)return;
  frame++;
  speed=4.5+Math.floor(score/200)*0.3;
  speed=Math.min(speed,12);

  // BG sky gradient
  const sky=ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#020c24');sky.addColorStop(1,'#0a1a40');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,GROUND);
  // Ground
  pxRect(0,GROUND,W,H-GROUND,'#0f172a');
  pxRect(0,GROUND,W,4,'#1e3a5f');
  // Ground detail
  for(let x=-(frame*speed*0.2%80);x<W;x+=80){pxRect(x,GROUND+8,40,2,'rgba(14,165,233,0.1)');}
  // Stars
  for(let i=0;i<40;i++){
    const sx=(i*137+frame*0.1)%W,sy=(i*97)%(GROUND-20);
    const b=0.3+0.7*Math.abs(Math.sin(i+frame*0.03));
    ctx.fillStyle=`rgba(200,220,255,${b})`;ctx.fillRect(sx,sy,1,1);
  }
  // Moon
  ctx.fillStyle='rgba(200,220,180,0.8)';ctx.beginPath();ctx.arc(W-60,40,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#020c24';ctx.beginPath();ctx.arc(W-52,36,14,0,Math.PI*2);ctx.fill();

  // Clouds
  clouds.forEach(cl=>{cl.x-=cl.speed;if(cl.x+cl.w*2<0)cl.x=W+cl.w;drawCloud(cl);});

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;p.alpha=p.life/15;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.r*2,p.r*2);
  }
  ctx.globalAlpha=1;

  // Coins
  coinTimer++;
  if(coinTimer>90){coinTimer=0;coins.push({x:W+20,y:GROUND-60-Math.random()*60,phase:Math.random()*Math.PI*2});}
  for(let i=coins.length-1;i>=0;i--){
    const co=coins[i];co.x-=speed;
    if(co.x<-20){coins.splice(i,1);continue;}
    drawCoin(co);
    // Collect
    if(Math.abs(player.x+player.w/2-co.x)<16&&Math.abs(player.y+player.h/2-co.y)<16){
      coins.splice(i,1);score+=10;
      for(let k=0;k<8;k++){const a=Math.random()*Math.PI*2,s=Math.random()*4+2;particles.push({x:co.x,y:co.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2,life:15,color:'#f59e0b',alpha:1});}
    }
  }

  // Obstacles
  spawnTimer++;
  const spawnRate=Math.max(60,120-speed*8);
  if(spawnTimer>spawnRate){spawnTimer=0;spawnObstacle();}
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];o.x-=speed;
    if(o.x+o.w<0){obstacles.splice(i,1);continue;}
    drawObstacle(o);
    // Collision
    if(player.x+4<o.x+o.w-4&&player.x+player.w-4>o.x+4&&player.y+4<o.y+o.h&&player.y+player.h>o.y+4){endGame();return;}
  }

  // Player physics
  player.vy+=0.7;player.y+=player.vy;
  if(player.y+player.h>=GROUND){player.y=GROUND-player.h;player.vy=0;player.jumps=2;}

  drawPlayer();

  // Score
  scoreTimer++;if(scoreTimer>3){score++;scoreTimer=0;}

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,32);
  ctx.fillStyle='#0ea5e9';ctx.font='bold 13px Courier New';ctx.textAlign='left';
  ctx.fillText(`SCORE: ${score}`,8,20);
  ctx.textAlign='center';ctx.fillStyle='#f59e0b';
  ctx.fillText(`BEST: ${Math.max(best,score)}`,W/2,20);
  ctx.textAlign='right';ctx.fillStyle='#94a3b8';
  ctx.fillText(`SPEED: ${speed.toFixed(1)}x`,W-8,20);
  ctx.textAlign='left';
  // Jump pips
  for(let j=0;j<2;j++){ctx.fillStyle=j<player.jumps?'#0ea5e9':'rgba(255,255,255,0.2)';ctx.fillRect(player.x+2+j*10,GROUND+12,8,5);}

  requestAnimationFrame(loop);
}

function endGame(){
  gameRunning=false;
  if(score>best)best=score;
  document.getElementById('hiBest').textContent='Best: '+best;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:#ef4444;text-shadow:0 0 30px #ef4444;">💥 GAME OVER</h1>
    <p style="color:#94a3b8;font-size:20px;margin:10px 0;">Score: <span style="color:#0ea5e9;font-size:28px;font-weight:bold;">${score}</span></p>
    <p style="color:#f59e0b;margin-bottom:22px;">Best: ${best}</p>
    <button class="btn" onclick="startGame()">🔄 RUN AGAIN</button>
    <p style="color:#475569;font-size:12px;margin-top:12px;">SPACE / ↑ / CLICK to Jump</p>
  `;
  ov.style.display='flex';
}
</script>
</body>
</html>
